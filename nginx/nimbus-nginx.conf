user www-data;
worker_processes auto;
pid /run/nimbus-nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    access_log /usr/local/nimbus/storage/logs/nginx_access.log;
    error_log /usr/local/nimbus/storage/logs/nginx_error.log;

    sendfile on;
    keepalive_timeout 65;
    
    server {
        listen 2095 ssl default_server;
        listen [::]:2095 ssl default_server;
        server_name nimbus.vmcore.in;

        ssl_certificate /etc/letsencrypt/live/nimbus.vmcore.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nimbus.vmcore.in/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        root /usr/local/nimbus/public;
        index index.php index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        client_max_body_size 100M;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass unix:/run/php/nimbus-php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include /etc/nginx/fastcgi_params;
            fastcgi_hide_header X-Powered-By;
        }

        # Deny access to sensitive files
        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
